name: PR Validation Build

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to build'
        required: true
        type: number

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  mark-required:
    if: github.event_name == 'pull_request_target'
    runs-on: self-hosted
    steps:
      - name: Mark PR validation as required
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'PR Validation Build',
              description: 'Maintainer must start PR validation build',
            });

  authorize:
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    outputs:
      pr_sha: ${{ steps.pr.outputs.sha }}
      authorized: ${{ steps.auth.outputs.authorized }}
    steps:
      - name: Resolve PR SHA
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = Number('${{ inputs.pr_number }}');
            const { data } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });
            core.setOutput('sha', data.head.sha);

      - name: Set build status to pending
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: '${{ steps.pr.outputs.sha }}',
              state: 'pending',
              context: 'PR Validation Build',
              description: 'PR validation build started',
            });

      - name: Verify requester is GitHub maintainer
        id: auth
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const username = context.actor;

            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username,
            });

            const allowed = ['admin', 'maintain'].includes(data.permission);
            core.setOutput('authorized', String(allowed));

            if (!allowed) {
              core.setFailed(`Only GitHub maintainers/admins can start the PR validation build. Current permission: ${data.permission}`);
            }

  build:
    if: github.event_name == 'workflow_dispatch'
    needs: authorize
    runs-on: self-hosted
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head

      - name: Build kas container image
        run: docker build -t rdk-kas-builder:latest .

      - name: Install kas-container
        run: |
          python3 -m venv /tmp/kas-venv
          /tmp/kas-venv/bin/pip install kas
          echo "/tmp/kas-venv/bin" >> "$GITHUB_PATH"

      - name: Build base RPi image
        env:
          KAS_CONTAINER_IMAGE: rdk-kas-builder:latest
        run: kas-container build kas/monolithic-raspberrypi4.yml

      - name: Stage base RPi image artifact
        run: |
          set -euo pipefail
          mkdir -p artifacts
          latest="$(ls -1t build/tmp/deploy/images/raspberrypi4-64-rdke/lib32-rdk-fullstack-image-*.rootfs.wic.bz2 | head -n1)"
          cp "$latest" "artifacts/rpi4-image-base-${{ needs.authorize.outputs.pr_sha }}.rootfs.wic.bz2"

      - name: Build SWUpdate RPi image
        env:
          KAS_CONTAINER_IMAGE: rdk-kas-builder:latest
        run: kas-container build kas/monolithic-raspberrypi4.yml:kas/extras/swupdate.yml

      - name: Stage SWUpdate RPi image artifact
        run: |
          set -euo pipefail
          mkdir -p artifacts
          latest="$(ls -1t build/tmp/deploy/images/raspberrypi4-64-rdke/lib32-rdk-fullstack-image-*.rootfs.wic.bz2 | head -n1)"
          cp "$latest" "artifacts/rpi4-image-swupdate-${{ needs.authorize.outputs.pr_sha }}.rootfs.wic.bz2"

      - name: Build SWUpdate package
        env:
          KAS_CONTAINER_IMAGE: rdk-kas-builder:latest
        run: kas-container build kas/monolithic-raspberrypi4.yml:kas/extras/swupdate.yml --target rdk-ab-update-image

      - name: Stage SWUpdate package artifact
        run: |
          set -euo pipefail
          mkdir -p artifacts
          latest="$(ls -1t build/tmp/deploy/images/raspberrypi4-64-rdke/rdk-ab-update-image-*.swu | head -n1)"
          cp "$latest" "artifacts/rpi4-package-swupdate-${{ needs.authorize.outputs.pr_sha }}.swu"

      - name: Upload base RPi image
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ inputs.pr_number }}-rpi-image-base-${{ needs.authorize.outputs.pr_sha }}
          path: artifacts/rpi4-image-base-${{ needs.authorize.outputs.pr_sha }}.rootfs.wic.bz2

      - name: Upload SWUpdate RPi image
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ inputs.pr_number }}-rpi-image-swupdate-${{ needs.authorize.outputs.pr_sha }}
          path: artifacts/rpi4-image-swupdate-${{ needs.authorize.outputs.pr_sha }}.rootfs.wic.bz2

      - name: Upload SWUpdate package
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ inputs.pr_number }}-rpi-package-swupdate-${{ needs.authorize.outputs.pr_sha }}
          path: artifacts/rpi4-package-swupdate-${{ needs.authorize.outputs.pr_sha }}.swu

  report:
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs:
      - authorize
      - build
    runs-on: self-hosted
    steps:
      - name: Publish final PR validation status
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = '${{ needs.authorize.outputs.pr_sha }}';
            if (!sha) {
              core.info('No PR SHA available, skipping final status update.');
              return;
            }

            let state = 'failure';
            let description = 'PR validation build failed';

            if ('${{ needs.authorize.result }}' !== 'success') {
              description = 'Build start rejected: only maintainers/admins can trigger';
            } else if ('${{ needs.build.result }}' === 'success') {
              state = 'success';
              description = 'PR validation build passed';
            }

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha,
              state,
              context: 'PR Validation Build',
              description,
            });

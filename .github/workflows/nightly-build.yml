name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: self-hosted
    outputs:
      needs_build: ${{ steps.check_tag.outputs.needs_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if current commit already has a nightly tag
        id: check_tag
        run: |
          tags=$(git tag --points-at HEAD | grep '^nightly-' || true)
          if [ -z "$tags" ]; then
            echo "No nightly tag on HEAD, build needed"
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Nightly tag already exists: $tags"
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.needs_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine build version
        id: version
        run: |
          base_tag="nightly-$(date -u +'%Y%m%d')"
          tag="${base_tag}"
          if git ls-remote --exit-code --tags origin "refs/tags/${base_tag}" >/dev/null 2>&1; then
            tag="${base_tag}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build kas container image
        run: docker build -t rdk-kas-builder:latest .

      - name: Install kas-container
        run: |
          python3 -m venv /tmp/kas-venv
          /tmp/kas-venv/bin/pip install kas
          echo "/tmp/kas-venv/bin" >> "$GITHUB_PATH"

      - name: Build base RPi image
        env:
          KAS_CONTAINER_IMAGE: rdk-kas-builder:latest
        run: kas-container build kas/monolithic-raspberrypi4.yml

      - name: Stage base RPi image artifact
        run: |
          set -euo pipefail
          mkdir -p artifacts
          latest="$(ls -1t build/tmp/deploy/images/raspberrypi4-64-rdke/lib32-rdk-fullstack-image-*.rootfs.wic.bz2 | head -n1)"
          cp "$latest" "artifacts/rpi4-image-base-${{ github.sha }}.rootfs.wic.bz2"

      - name: Build SWUpdate RPi image
        env:
          KAS_CONTAINER_IMAGE: rdk-kas-builder:latest
        run: |
          kas-container --runtime-args "--env BUILD_VERSION=${{ steps.version.outputs.tag }}" \
            build kas/monolithic-raspberrypi4.yml:kas/extras/swupdate.yml

      - name: Stage SWUpdate RPi image artifact
        run: |
          set -euo pipefail
          mkdir -p artifacts
          latest="$(ls -1t build/tmp/deploy/images/raspberrypi4-64-rdke/lib32-rdk-fullstack-image-*.rootfs.wic.bz2 | head -n1)"
          cp "$latest" "artifacts/rpi4-image-swupdate-${{ github.sha }}.rootfs.wic.bz2"

      - name: Build SWUpdate package
        env:
          KAS_CONTAINER_IMAGE: rdk-kas-builder:latest
        run: |
          kas-container --runtime-args "--env BUILD_VERSION=${{ steps.version.outputs.tag }}" \
            build kas/monolithic-raspberrypi4.yml:kas/extras/swupdate.yml --target rdk-ab-update-image

      - name: Stage SWUpdate package artifact
        run: |
          set -euo pipefail
          mkdir -p artifacts
          latest="$(ls -1t build/tmp/deploy/images/raspberrypi4-64-rdke/rdk-ab-update-image-*.swu | head -n1)"
          cp "$latest" "artifacts/rpi4-package-swupdate-${{ github.sha }}.swu"

      - name: Upload base RPi image
        uses: actions/upload-artifact@v4
        with:
          name: nightly-rpi-image-base-${{ github.sha }}
          path: artifacts/rpi4-image-base-${{ github.sha }}.rootfs.wic.bz2

      - name: Upload SWUpdate RPi image
        uses: actions/upload-artifact@v4
        with:
          name: nightly-rpi-image-swupdate-${{ github.sha }}
          path: artifacts/rpi4-image-swupdate-${{ github.sha }}.rootfs.wic.bz2

      - name: Upload SWUpdate package
        uses: actions/upload-artifact@v4
        with:
          name: nightly-rpi-package-swupdate-${{ github.sha }}
          path: artifacts/rpi4-package-swupdate-${{ github.sha }}.swu

      - name: Tag commit with nightly build date
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

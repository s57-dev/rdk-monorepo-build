# ------------------------------------------------------------------
# Kernel config fragment: built-in virtio drivers for QEMU virt machine
# ------------------------------------------------------------------
CONFIG_VIRTIO=y
CONFIG_VIRTIO_MENU=y
CONFIG_VIRTIO_MMIO=y
CONFIG_VIRTIO_MMIO_CMDLINE_DEVICES=y
CONFIG_VIRTIO_PCI=y
CONFIG_VIRTIO_PCI_LIB=y
CONFIG_VIRTIO_BLK=y

CONFIG_VIRTIO_NET=y
CONFIG_DRM_VIRTIO_GPU=y

CONFIG_VIRTIO_CONSOLE=y

CONFIG_VIRTIO_INPUT=y
CONFIG_HW_RANDOM_VIRTIO=y

# PCI host controller for the QEMU virt machine
CONFIG_PCI=y
CONFIG_PCI_HOST_GENERIC=y

# PL011 UART (console on the virt machine: ttyAMA0)
CONFIG_SERIAL_AMBA_PL011=y
CONFIG_SERIAL_AMBA_PL011_CONSOLE=y

CONFIG_SOUND=y
CONFIG_SND=y
CONFIG_SND_PCM=y
CONFIG_SND_TIMER=y
CONFIG_SND_DUMMY=y
CONFIG_VIRTIO_SND=y

# Minimal BSP overlay layer that adds QEMU/virtio support to the
# Raspberry Pi 4 kernel and guest graphics stack.

# We give this layer a low priority so it only provides additive
# bbappends and never overrides recipes from the vendor layers.

BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"
BBFILE_COLLECTIONS += "meta-rpi-qemu"
BBFILE_PATTERN_meta-rpi-qemu = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-rpi-qemu = "10"

LAYERDEPENDS_meta-rpi-qemu = "core raspberrypi"
LAYERSERIES_COMPAT_meta-rpi-qemu = "kirkstone scarthgap"

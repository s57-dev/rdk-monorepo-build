# RDKE middleware, vendor, product and config repositories, plus shared
# local.conf settings for the monolithic Raspberry Pi 4 build.
#
# This file is not meant to be built directly — include it from a
# top-level kas configuration.
header:
  version: 14

machine: raspberrypi4-64-rdke
distro: rdk

bblayers_conf_header:
  standard: |
    LCONF_VERSION = "6"
    BBPATH = "${TOPDIR}"
    BBFILES ?= ""
  # meta-middleware-generic-support requires conf/distro/include/rdkv.inc
  z-meta-rdk-bbpath: |
    BBPATH .= ":${TOPDIR}/../rdke/middleware/generic/meta-rdk"
  # RDKROOT is used by several recipes and config layers to reference
  # layer paths in BBLAYERS and BBMASK. It must point to the checkout
  # root (parent of TOPDIR/build).
  z-rdkroot: |
    RDKROOT := "${TOPDIR}/.."
  # Disable ipk feeds (non layered build)
  z-no-ipk-feeds: |
    RDK_ARTIFACTS_BASE_URL = ""
    RDK_ARTIFACTS_URL = ""
    IPK_FEED_URIS = ""

local_conf_header:
  # In the layered build, inter-layer DEPENDS were resolved via IPK feeds.
  # Some recipes use sub-package names or RPROVIDES-only names in DEPENDS.
  # These need explicit PROVIDES in the monolithic build.
  monolithic-provides-fixups: |
    PROVIDES:pn-deepsleepmgr-hal-raspberrypi4:append = " virtual/vendor-deepsleepmgr-hal"
    PROVIDES:pn-systemaudioplatform:append = " virtual/vendor-systemaudioplatform"
    RPROVIDES:systemaudioplatform:append = " virtual/vendor-systemaudioplatform"
    PROVIDES:pn-iarmbus:append = " iarmbus-headers"
    PROVIDES:pn-gstreamer1.0-plugins-base:append = " gstreamer1.0-plugins-base-app \
                                                    gstreamer1.0-plugins-base-playback gstreamer1.0-plugins-base-audioconvert \
                                                    gstreamer1.0-plugins-base-audioresample gstreamer1.0-plugins-base-gio \
                                                    gstreamer1.0-plugins-base-videoconvert gstreamer1.0-plugins-base-videoscale \
                                                    gstreamer1.0-plugins-base-volume \
                                                    gstreamer1.0-plugins-base-typefindfunctions \
                                                    gstreamer1.0-plugins-base-meta"
  # The vendor layer masks halif-header recipes that were IPK-supplied.
  # In monolithic build, those headers are needed at build-time.
  monolithic-vendor-vars: |
    MANIFEST_PATH_PLATFORM = "${TOPDIR}/../rdke/vendor/meta-vendor-raspberrypi-dev"
    MANIFEST_PATH_RDK_IMAGES = "${TOPDIR}/../rdke/image-assembler/meta-rdk-images"
  # Install Solution57 prebuilt Bolt apps and trust key into the image.
  monolithic-bolt-prebuilts: |
    FACTORY_APPS_JSON_FILE = "${TOPDIR}/../kas/extras/factory-app-version.json"

  # The vendor layer masks halif-header recipes that were IPK-supplied.
  # In monolithic build, those headers are needed at build-time.
  monolithic-unmask: |
    BBMASK:remove = " meta-rdk-halif-headers/recipes-rdk-halif-headers/audiocapture/"
    BBMASK:remove = " meta-rdk-halif-headers/recipes-rdk-halif-headers/tvsettings"
    BBMASK:append = " meta-rdk-halif-headers/recipes-rdk-headers/iarmbus/"

  # rdk-gstreamer-utils (middleware) and rdk-gstreamer-utils-headers (halif)
  # both install rdk_gstreamer_utils.h to /usr/include. Remove the header from
  # rdk-gstreamer-utils so only the halif-headers copy exists, avoiding sysroot
  # conflicts while letting rdk-gstreamer-utils-platform depend on the headers
  # recipe without a circular dependency.
  monolithic-sysroot-fixups: |
    do_install:append:pn-rdk-gstreamer-utils = " rm -f ${D}${includedir}/rdk_gstreamer_utils.h; rm -f ${D}${includedir}/rdk_gstreamer_utils_soc.h;"
  # meta-lts-mixins provides newer cairo 1.18.0 and librsvg 2.58.5, but on RPI
  # we still need an older version
  monolithic-version-fixups: |
    BBMASK:append = " meta-lts-mixins/recipes-gnome/librsvg/"
    BBMASK:append = " meta-lts-mixins/recipes-graphics/cairo/"
    PREFERRED_VERSION_librsvg = "2.40.21"
    PREFERRED_VERSION_lib32-librsvg = "2.40.21"
    PREFERRED_VERSION_cairo = "1.16.0"
    PREFERRED_VERSION_lib32-cairo = "1.16.0"
  # Unversioned .so cross-recipe deps that the shlib resolver can't track
  monolithic-qa-fixups: |
    INSANE_SKIP:pn-rdk-gstreamer-utils:append = " file-rdeps"

  # Allow empty root password for development/testing.
  monolithic-dev-access: |
    EXTRA_IMAGE_FEATURES += "debug-tweaks"

repos:

  rdke-common-config:
    url: "https://github.com/rdkcentral/rdke-common-config.git"
    refspec: refs/tags/1.0.20
    path: rdke/configs/common

  rdke-stb-config:
    url: "https://github.com/rdkcentral/rdke-stb-config.git"
    refspec: refs/tags/1.0.0
    path: rdke/configs/profile

  meta-oss-common-config:
    url: "https://github.com/rdkcentral/meta-oss-common-config.git"
    refspec: refs/tags/1.4.0
    path: rdke/configs/ext

  meta-image-support-rdke:
    url: "https://github.com/rdkcentral/meta-image-support-rdke.git"
    refspec: refs/tags/1.0.0
    path: rdke/vendor/meta-image-support-rdke

  meta-oss-vendor-raspberrypi:
    url: "https://github.com/rdkcentral/meta-oss-vendor-raspberrypi.git"
    refspec: refs/tags/4.1.4
    path: rdke/vendor/meta-vendor-raspberrypi-oss

  meta-vendor-raspberrypi-dev:
    url: "https://github.com/rdkcentral/meta-vendor-raspberrypi-dev.git"
    refspec: refs/tags/4.11.0
    path: rdke/vendor/meta-vendor-raspberrypi-dev
    patches:
      fix-displayinfo-soc-packaging:
        path: ../../../patches/0002-displayinfo-soc-fix-so-packaging.patch
        repo: meta-vendor-raspberrypi-dev

  meta-product-raspberrypi:
    url: "https://github.com/rdkcentral/meta-product-raspberrypi.git"
    refspec: refs/tags/4.1.4
    path: rdke/product/meta-product-raspberrypi

  meta-middleware-generic-support:
    url: "https://github.com/rdkcentral/meta-middleware-generic-support.git"
    refspec: refs/tags/1.17.0
    path: rdke/middleware/generic/meta-middleware-generic-support

  meta-rdk:
    url: "https://github.com/rdkcentral/meta-rdk.git"
    refspec: refs/tags/1.17.0
    path: rdke/middleware/generic/meta-rdk

  meta-rdk-video:
    url: "https://github.com/rdkcentral/meta-rdk-video.git"
    refspec: refs/tags/1.17.0
    path: rdke/middleware/generic/meta-rdk-video

  meta-image-assembler-rdke:
    url: "https://github.com/rdkcentral/meta-image-assembler-rdke.git"
    refspec: refs/tags/4.1.6
    path: rdke/image-assembler/meta-rdk-images

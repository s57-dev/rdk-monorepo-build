    refspec: refs/tags/4.9.0
    path: rdke/common/meta-rdk-oss-reference

  meta-rdk-halif-headers:
    url: "https://github.com/rdkcentral/meta-rdk-halif-headers.git"
    refspec: refs/tags/3.0.2
    path: rdke/common/meta-rdk-halif-headers

  # Pinned to kirkstone branch — consider a commit hash for reproducibility
  meta-clang:
    url: "https://github.com/rdkcentral/meta-clang.git"
    refspec: kirkstone
    path: rdke/common/meta-clang

  rdke-common-config:

    path: rdke/middleware/meta-python2

  meta-middleware-generic-support:
    url: "https://github.com/rdkcentral/meta-middleware-generic-support.git"
    refspec: refs/tags/1.15.0
    path: rdke/middleware/generic/meta-middleware-generic-support

  meta-rdk:
    url: "https://github.com/rdkcentral/meta-rdk.git"
    refspec: refs/tags/1.15.0
    path: rdke/middleware/generic/meta-rdk

  meta-rdk-video:
    url: "https://github.com/rdkcentral/meta-rdk-video.git"
    refspec: refs/tags/1.15.0
    path: rdke/middleware/generic/meta-rdk-video

  meta-application-rdke-dev:
    url: "https://github.com/rdkcentral/meta-application-rdke-dev.git"
    refspec: refs/tags/5.1.0
    path: rdke/application/meta-application-rdke-dev

  meta-image-assembler-rdke:
